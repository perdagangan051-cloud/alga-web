<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alga Advertising</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#020617;color:white;overflow-x:hidden;}

/* NAVBAR GLASS */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(12px);
z-index:1000;
}
nav h2{color:#22c55e;}

/* HERO PREMIUM */
.hero{
height:100vh;
background:url('alga-web.jpg') center/cover no-repeat;
display:flex;
align-items:center;
padding:0 10%;
position:relative;
overflow:hidden;
}

/* parallax overlay */
.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to right,rgba(0,0,0,0.85),rgba(0,0,0,0.2));
}

.hero-content{
position:relative;
z-index:2;
max-width:500px;
animation:fadeUp 1.2s ease;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cbd5f5;
}

/* SECTION */
section{padding:100px 20px;}
h2{text-align:center;margin-bottom:40px;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

/* CARD GLASS */
.card{
background:rgba(30,41,59,0.6);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transform:translateY(60px);
opacity:0;
transition:all 0.8s cubic-bezier(0.22,1,0.36,1);
}
.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{padding:15px;}

.btn-kecil{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#22c55e;
border-radius:6px;
color:white;
text-decoration:none;
}

/* MAP */
.map iframe{
width:100%;
height:320px;
border:none;
border-radius:12px;
}

/* CTA */
.cta{
text-align:center;
background:linear-gradient(135deg,#1e293b,#020617);
padding:80px 20px;
}

.btn-besar{
display:inline-block;
background:#22c55e;
padding:16px 40px;
border-radius:12px;
font-size:18px;
font-weight:bold;
text-decoration:none;
color:white;
transition:0.3s;
}
.btn-besar:hover{
transform:scale(1.05);
}

/* WA FLOAT SUPER JELAS */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:16px 22px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
animation:pulse 2s infinite;
}

/* animasi */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* RESPONSIVE */
@media(max-width:768px){
.hero{
justify-content:center;
text-align:center;
padding:0 20px;
}
.hero h1{font-size:28px;}
}
</style>
</head>

<body>

<nav>
<h2>ALGA</h2>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>ALGA ADVERTISING</h1>
<p>Percetakan Cepat, Lengkap & Profesional</p>
</div>
</section>

<!-- KATALOG -->
<section>
<h2>Katalog Produk</h2>

<div class="grid">

<div class="card">
<img src="spanduk.jpg">
<div class="card-content">
<h3>Spanduk & Banner</h3>
<a href="https://wa.me/6282223488003" class="btn-kecil">Pesan</a>
</div>
</div>

<div class="card">
<img src="merchandise.jpg">
<div class="card-content">
<h3>Merchandise</h3>
<a href="https://wa.me/6282223488003" class="btn-kecil">Pesan</a>
</div>
</div>

<div class="card">
<img src="plakat.jpg">
<div class="card-content">
<h3>Plakat</h3>
<a href="https://wa.me/6282223488003" class="btn-kecil">Pesan</a>
</div>
</div>

</div>
</section>

<!-- MAP -->
<section>
<h2>Lokasi Kami</h2>

<div class="map">
<iframe src="https://maps.google.com/maps?q=iNgUv1aBcE91pBjM9&output=embed"></iframe>
</div>
</section>

<!-- CTA -->
<section class="cta">
<h2>Siap Order Sekarang?</h2>
<a href="https://wa.me/6282223488003" class="btn-besar">
Order via WhatsApp
</a>
</section>

<!-- WA FLOAT -->
<a href="https://wa.me/6282223488003" class="wa">
WhatsApp
</a>

<script>
// SCROLL ANIMATION
window.addEventListener('scroll',()=>{
document.querySelectorAll('.card').forEach(card=>{
let top=card.getBoundingClientRect().top;
if(top < window.innerHeight - 80){
card.classList.add('show');
}
});
});
</script>

</body>
</html>
